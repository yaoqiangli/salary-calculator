<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="工资计算器">
<meta name="theme-color" content="#3B8CF5">
<title>上海工资计算器</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%233B8CF5'/><text x='90' y='120' font-size='110' text-anchor='middle' fill='white' font-family='-apple-system,sans-serif' font-weight='700'>¥</text></svg>">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #f4f5f7;
    color: #222;
    -webkit-font-smoothing: antialiased;
  }
  /* 顶部标题（独立，只负责标题） */
  .hero {
    background: linear-gradient(135deg, #3B8CF5 0%, #66B3FF 100%);
    color: #fff;
    padding: calc(env(safe-area-inset-top, 0) + 22px) 20px 20px;
    text-align: center;
  }
  .hero h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .hero .sub {
    font-size: 12px;
    opacity: .88;
  }

  /* 输入卡片（白底，独立卡片） */
  .input-card {
    background: #fff;
    border-radius: 14px;
    padding: 20px 16px 18px;
    margin: -12px 16px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    position: relative;
    z-index: 1;
  }

  /* 统一块间距：所有"输入块"之间都是 18px */
  .input-card > .field,
  .input-card > .field-pair,
  .input-card > .quick-row {
    margin-bottom: 18px;
  }
  .input-card > *:last-child {
    margin-bottom: 0;
  }

  .field {
    margin-bottom: 0;   /* 由上面的 > 选择器统一控制 */
  }
  /* 两个字段并排：内部 field 不要再加底部 margin，由 grid gap 管水平 */
  .field-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .field-pair .field {
    margin-bottom: 0;
  }
  .field label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #555;
    margin-bottom: 6px;
    min-height: 22px;  /* 保证和带按钮的 label 等高 */
  }
  .field-hint {
    font-size: 11px;
    color: #aaa;
    margin-left: 6px;
    font-weight: normal;
  }
  .sync-btn {
    background: #EEF3FA;
    border: 1px solid #CFDEF3;
    color: #3B8CF5;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: inherit;
    cursor: pointer;
  }
  .sync-btn:active { background: #DCE7F5; }

  /* 输入框：浅灰边框，白底 */
  .input-row {
    display: flex;
    align-items: center;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    background: #FAFBFC;
    padding: 8px 12px;
    transition: border-color .15s;
  }
  .input-row:focus-within {
    border-color: #3B8CF5;
    background: #fff;
  }
  .input-row .prefix {
    font-size: 18px;
    font-weight: 600;
    margin-right: 6px;
    color: #888;
  }
  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #222;
    font-size: 20px;
    font-weight: 600;
    caret-color: #3B8CF5;
    width: 100%;
    min-width: 0;
    -webkit-appearance: none;
    appearance: none;
    padding: 0;
  }
  .input-row input::placeholder { color: #bbb; font-weight: 500; }
  /* "自动跟随"状态：输入框为空时显示一个灰色的提示数字（由 JS 填入 value） */
  .input-row input.auto-value {
    color: #bbb;
    font-weight: 500;
  }

  .field-pair .input-row .prefix { font-size: 16px; }
  .field-pair .input-row input { font-size: 18px; }
  @media (max-width: 375px) {
    .field-pair { gap: 10px; }
    .field-pair .input-row .prefix { font-size: 14px; }
    .field-pair .input-row input { font-size: 16px; }
  }

  /* 分段选择器（白底版） */
  .segmented {
    display: flex;
    background: #F1F3F6;
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 8px;
  }
  .segmented button {
    flex: 1;
    border: none;
    background: transparent;
    color: #555;
    font-size: 14px;
    padding: 8px 0;
    border-radius: 8px;
    font-family: inherit;
  }
  .segmented button.active {
    background: #fff;
    color: #3B8CF5;
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }

  .inline-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
    margin-top: 4px;
  }
  .inline-row select {
    background: #F1F3F6;
    color: #222;
    border: none;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 8px;
    -webkit-appearance: none;
    appearance: none;
    font-family: inherit;
  }
  .inline-row select option { color: #222; }

  /* 快捷按钮组（浅底版） */
  .quick-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .quick-row button {
    flex: 1;
    min-width: 0;
    border: 1px solid #e5e7eb;
    background: #F7F8FA;
    color: #555;
    font-size: 12px;
    padding: 7px 0;
    border-radius: 8px;
    font-family: inherit;
  }
  .quick-row button:active {
    background: #EEF3FA;
  }
  .quick-row button.active {
    background: #3B8CF5;
    color: #fff;
    font-weight: 600;
    border-color: #3B8CF5;
  }

  /* 结果区 */
  .content {
    padding: 0 16px;
    padding-bottom: calc(env(safe-area-inset-bottom, 0) + 32px);
  }
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .card-title {
    display: flex;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    color: #3B8CF5;
    margin-bottom: 12px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    background: #3B8CF5;
    margin-right: 6px;
    border-radius: 2px;
  }

  /* 顶部总览蓝卡 */
  .summary {
    background: linear-gradient(135deg, #3B8CF5 0%, #5AA8FF 100%);
    color: #fff;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .summary .big {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.2;
  }
  .summary .big-label {
    display: inline-block;
    background: #fff;
    color: #3B8CF5;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 8px;
    margin-left: 6px;
    vertical-align: middle;
    font-weight: 500;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px 4px;
    margin-top: 14px;
    background: rgba(255,255,255,.12);
    padding: 12px 6px;
    border-radius: 10px;
  }
  .summary-grid .item {
    text-align: center;
    min-width: 0;
  }
  .summary-grid .v {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .summary-grid .t {
    font-size: 10px;
    opacity: .85;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* 计税方式对比格：数字在上（和普通格一致），标签在下显示计税方式 */
  .summary-grid .item.compare.clickable {
    cursor: pointer;
  }
  .summary-grid .item.compare.clickable .v {
    color: #FFE082;   /* 可切换时数字变成黄色，吸引注意 */
  }
  .summary-grid .item.compare.clickable:active {
    opacity: .7;
  }

  /* 月度速览横条 */
  .monthly-glance {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .mg-item {
    background: #fff;
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .mg-v {
    font-size: 22px;
    font-weight: 700;
    color: #3B8CF5;
    line-height: 1.1;
  }
  .mg-t {
    font-size: 12px;
    color: #555;
    margin-top: 6px;
  }
  .mg-note {
    color: #999;
    font-size: 11px;
    margin-left: 2px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 10px 3px;
    text-align: center;
    border-bottom: 1px solid #eee;
    white-space: nowrap;
  }
  th:first-child, td:first-child { text-align: left; padding-left: 8px; }
  th:last-child, td:last-child { text-align: right; padding-right: 8px; }
  th {
    color: #3B8CF5;
    font-weight: 500;
    font-size: 12px;
    border-bottom: 1px solid #eee;
  }
  /* 五险一金表：每行独立 grid（tr 保留，可以画整行下划线） */
  .ins-table {
    width: 100%;
    border-collapse: collapse;
  }
  .ins-table thead, .ins-table tbody, .ins-table tfoot { display: contents; }
  .ins-table tr {
    display: grid;
    grid-template-columns: 72px auto auto auto;   /* 第 1 列固定 72px 容纳"住房公积金"5 字 */
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid #eee;
  }
  .ins-table th, .ins-table td {
    padding: 10px 0;
    white-space: nowrap;
    border: none;
  }
  /* 第 1 列左对齐；数据列的 cell 本身居中，cell 内容（amt-cell）自己右对齐—— 这样表头和数据中心对齐 */
  .ins-table td:nth-child(1), .ins-table th:nth-child(1) { justify-self: start; }
  .ins-table td:nth-child(n+2), .ins-table th:nth-child(n+2) { justify-self: center; }

  .ins-table th {
    color: #3B8CF5;
    font-weight: 500;
    font-size: 12px;
  }
  .ins-table .total-row {
    border-bottom: none;
    background: #f8fafd;
  }
  .ins-table .total-row td {
    font-weight: 600;
    color: #222;
    padding: 12px 0;
  }
  .ins-table .amt-cell {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    font-variant-numeric: tabular-nums;
  }
  .ins-table .amt-cell .amt {
    min-width: 56px;
    text-align: right;
  }
  .ins-table .amt-cell .pct {
    color: #aaa;
    font-size: 10px;
    min-width: 32px;
    text-align: right;
  }
  /* 表头的 amt-cell：文字居中对齐，不走右对齐 */
  .ins-table th .amt-cell .amt { text-align: center; }
  .ins-table th .amt-cell .pct { text-align: center; }

  /* 每月到手表：同思路，5 列 */
  .monthly-table {
    width: 100%;
    border-collapse: collapse;
  }
  .monthly-table thead, .monthly-table tbody { display: contents; }
  .monthly-table tr {
    display: grid;
    grid-template-columns: 34px auto auto auto auto;  /* 月份列固定，足以装"12月" */
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid #eee;
  }
  .monthly-table tr:last-child { border-bottom: none; }
  .monthly-table th, .monthly-table td {
    padding: 10px 0;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    border: none;
  }
  .monthly-table td:nth-child(1), .monthly-table th:nth-child(1) { justify-self: start; }
  .monthly-table td:nth-child(n+2), .monthly-table th:nth-child(n+2) { justify-self: center; }
  /* 统一数据单元格宽度，保证各行列位置一致（同 .amt-cell 思路） */
  .monthly-table .mc-num { display: inline-block; min-width: 58px; text-align: right; }
  .monthly-table .mc-rate { display: inline-block; min-width: 34px; text-align: right; }
  .monthly-table .mc-month { display: inline-block; min-width: 30px; }
  /* 表头里同样的 span 改为居中，和数据块中心对齐 */
  .monthly-table th .mc-num,
  .monthly-table th .mc-rate,
  .monthly-table th .mc-month { text-align: center; }
  .monthly-table th {
    color: #3B8CF5;
    font-weight: 500;
    font-size: 12px;
  }
  @media (max-width: 375px) {
    th, td { font-size: 12px; padding: 9px 2px; }
    .muted { font-size: 10px; }
  }
  tr:last-child td { border-bottom: none; }
  .total-row td {
    font-weight: 600;
    color: #222;
    background: #f8fafd;
  }
  .muted { color: #888; font-size: 11px; }
  /* 税率列交替色：相邻的不同税率档用深浅色区分，同一档保持一致 */
  .rate-a { color: #222; }
  .rate-b { color: #888; }
  .base-note {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #e5e7eb;
    font-size: 11px;
    color: #888;
    /* 3 列全部 auto：标签 / 数字+状态 / 限额 紧挨在一起，右侧留白 */
    display: grid;
    grid-template-columns: auto auto auto;
    justify-content: start;
    column-gap: 10px;
    row-gap: 4px;
    align-items: baseline;
  }
  .base-note .bn-label { color: #666; }
  .base-note .bn-val {
    font-variant-numeric: tabular-nums;
    color: #333;
    font-weight: 500;
  }
  .base-note .bn-limit {
    color: #aaa;
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .base-note .hit { color: #e67700; font-weight: 500; margin-left: 4px; }
  .base-note .custom {
    color: #3B8CF5;
    font-weight: 500;
    border: 1px solid #3B8CF5;
    border-radius: 4px;
    padding: 0 4px;
    font-size: 10px;
    margin-left: 4px;
  }

  .hint {
    text-align: center;
    color: #aaa;
    font-size: 11px;
    margin: 16px 0;
  }
</style>
</head>
<body>

<div class="hero">
  <h1>上海工资计算器</h1>
  <div class="sub">2025 年度上海标准 · 累计预扣预缴 · 年终奖可选计税</div>
</div>

<div class="input-card">

  <!-- 第一行：月薪 + 年终奖 -->
  <div class="field-pair">
    <div class="field">
      <label>税前月薪（元）</label>
      <div class="input-row">
        <span class="prefix">¥</span>
        <input type="text" inputmode="decimal" id="salary" value="60000" autocomplete="off">
      </div>
    </div>
    <div class="field">
      <label>年终奖（元，可选）</label>
      <div class="input-row">
        <span class="prefix">¥</span>
        <input type="text" inputmode="decimal" id="bonus" value="0" autocomplete="off">
      </div>
    </div>
  </div>

  <!-- 年终奖快捷按钮（单独一行占满宽度，点击体验更好） -->
  <div class="quick-row" id="bonusQuick">
    <button type="button" data-m="0">清零</button>
    <button type="button" data-m="1">1 月薪</button>
    <button type="button" data-m="2">2 月薪</button>
    <button type="button" data-m="3">3 月薪</button>
    <button type="button" data-m="6">6 月薪</button>
    <button type="button" data-m="12">12 月薪</button>
  </div>

  <!-- 第二行：社保基数 + 公积金基数（默认同步跟随月薪，点"↻"恢复同步） -->
  <div class="field-pair base-pair">
    <div class="field">
      <label>社保基数（元）</label>
      <div class="input-row">
        <span class="prefix">¥</span>
        <input type="text" inputmode="decimal" id="socialBase" autocomplete="off">
      </div>
    </div>
    <div class="field">
      <label>
        公积金基数（元）
        <button type="button" class="sync-btn" id="syncBase" title="与社保基数保持一致">= 社保</button>
      </label>
      <div class="input-row">
        <span class="prefix">¥</span>
        <input type="text" inputmode="decimal" id="hfBase" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="field">
    <label>年终奖计税方式</label>
    <div class="segmented" id="bonusMode">
      <button data-v="separate" class="active">单独计税</button>
      <button data-v="combined">并入综合所得</button>
    </div>
    <div class="inline-row">
      <span>发放月份</span>
      <select id="bonusMonth"></select>
    </div>
  </div>
</div>

<div class="content">
  <!-- 汇总蓝卡 -->
  <div class="summary">
    <div>
      <span class="big" id="annualNet">—</span>
      <span class="big-label">到手年薪</span>
    </div>
    <div class="summary-grid" id="summaryGrid"></div>
  </div>

  <!-- 月度速览 -->
  <div class="monthly-glance">
    <div class="mg-item">
      <div class="mg-v" id="avgCash">—</div>
      <div class="mg-t">平均到手月薪 <span class="mg-note">不含年终</span></div>
    </div>
    <div class="mg-item">
      <div class="mg-v" id="avgReal">—</div>
      <div class="mg-t">平均月含公积金 <span class="mg-note">不含年终</span></div>
    </div>
  </div>

  <!-- 五险一金 -->
  <div class="card">
    <div class="card-title">每月五险一金</div>
    <table class="ins-table">
      <thead>
        <tr>
          <th>项目</th>
          <th>基数</th>
          <th><span class="amt-cell"><span class="amt">个人</span><span class="pct">&nbsp;</span></span></th>
          <th><span class="amt-cell"><span class="amt">公司</span><span class="pct">&nbsp;</span></span></th>
        </tr>
      </thead>
      <tbody id="insuranceBody"></tbody>
      <tfoot>
        <tr class="total-row">
          <td>总计</td>
          <td aria-hidden="true" style="visibility:hidden">37,302.0</td>
          <td><span class="amt-cell"><span class="amt" id="personalTotal">—</span><span class="pct">&nbsp;</span></span></td>
          <td><span class="amt-cell"><span class="amt" id="companyTotal">—</span><span class="pct">&nbsp;</span></span></td>
        </tr>
      </tfoot>
    </table>
    <div class="base-note" id="baseNote"></div>
  </div>

  <!-- 每月明细 -->
  <div class="card">
    <div class="card-title">每月到手工资</div>
    <table class="monthly-table">
      <thead>
        <tr>
          <th><span class="mc-month">月份</span></th>
          <th><span class="mc-num">税前</span></th>
          <th><span class="mc-rate">税率</span></th>
          <th><span class="mc-num">个税</span></th>
          <th><span class="mc-num">税后</span></th>
        </tr>
      </thead>
      <tbody id="monthlyBody"></tbody>
    </table>
  </div>

  <div class="hint">仅供参考 · 按上海 2025 年度标准（2025-07-01 起）</div>
</div>

<script>
// ================= 配置（对应 Swift SalaryConfig.swift） =================
// 数据来源：
//  - 社保基数：上海市人社局 2025-09-18 公告，自 2025-07-01 起执行
//  - 公积金基数：沪公积金管委会〔2025〕8 号，自 2025-07-01 起执行
//  - 全口径城镇单位就业人员平均工资：12434 元/月（2024 年度）
const CONFIG = {
  // 社保（养老/医疗/失业/工伤/生育）基数
  socialBaseMin: 7460,
  socialBaseMax: 37302,
  // 公积金基数（下限参照最低工资 2690，未变；上限同社保）
  housingFundBaseMin: 2690,
  housingFundBaseMax: 37302,
  taxThresholdMonthly: 5000,
  insurance: [
    { name: '养老保险',   personal: 0.08,  company: 0.16  },
    { name: '医疗保险',   personal: 0.02,  company: 0.085 },
    { name: '失业保险',   personal: 0.005, company: 0.005 },
    { name: '工伤保险',   personal: 0.0,   company: 0.0026 },
    { name: '生育保险',   personal: 0.0,   company: 0.0   },
    { name: '住房公积金', personal: 0.12,  company: 0.12  },
  ],
  // 年度累进税率表 [上限, 税率, 速算扣除]
  yearlyBrackets: [
    [36000,    0.03, 0],
    [144000,   0.10, 2520],
    [300000,   0.20, 16920],
    [420000,   0.25, 31920],
    [660000,   0.30, 52920],
    [960000,   0.35, 85920],
    [Infinity, 0.45, 181920],
  ],
  // 年终奖月度表（年度 / 12）
  bonusMonthlyBrackets: [
    [3000,     0.03, 0],
    [12000,    0.10, 210],
    [25000,    0.20, 1410],
    [35000,    0.25, 2660],
    [55000,    0.30, 4410],
    [80000,    0.35, 7160],
    [Infinity, 0.45, 15160],
  ],
};

const clamp = (x, lo, hi) => Math.min(Math.max(x, lo), hi);
const round2 = x => Math.round(x * 100) / 100;

function cumulativeTax(taxable) {
  if (taxable <= 0) return 0;
  for (const [ub, r, q] of CONFIG.yearlyBrackets) {
    if (taxable <= ub) return taxable * r - q;
  }
  return 0;
}

function bonusTaxSeparate(bonus) {
  if (bonus <= 0) return 0;
  const m = bonus / 12;
  for (const [ub, r, q] of CONFIG.bonusMonthlyBrackets) {
    if (m <= ub) return bonus * r - q;
  }
  return 0;
}

function calculate({ monthly, bonus, mode, bonusMonth, customSocialBase, customHfBase }) {
  // 月薪 0 视为无效，基数全归 0（不强制按下限保底）
  const socialBase = (customSocialBase != null && customSocialBase > 0)
    ? clamp(customSocialBase, CONFIG.socialBaseMin, CONFIG.socialBaseMax)
    : (monthly > 0 ? clamp(monthly, CONFIG.socialBaseMin, CONFIG.socialBaseMax) : 0);
  const socialIsCustom = customSocialBase != null && customSocialBase > 0;
  // 公积金基数：优先用自定义值，否则跟随月薪
  let hfBase;
  if (customHfBase != null && customHfBase > 0) {
    hfBase = clamp(customHfBase, CONFIG.housingFundBaseMin, CONFIG.housingFundBaseMax);
  } else if (monthly > 0) {
    hfBase = clamp(monthly, CONFIG.housingFundBaseMin, CONFIG.housingFundBaseMax);
  } else {
    hfBase = 0;
  }
  const hfIsCustom = customHfBase != null && customHfBase > 0;
  const _customSocialBase = customSocialBase;
  const _customHfBase = customHfBase;

  const insurance = CONFIG.insurance.map(it => {
    const base = it.name === '住房公积金' ? hfBase : socialBase;
    return {
      name: it.name,
      base: base,
      personalRate: it.personal,
      companyRate:  it.company,
      personalAmount: round2(base * it.personal),
      companyAmount:  round2(base * it.company),
    };
  });
  const personalTotal = round2(insurance.reduce((s, i) => s + i.personalAmount, 0));
  const companyTotal  = round2(insurance.reduce((s, i) => s + i.companyAmount,  0));

  const bm = clamp(bonusMonth, 1, 12);
  const monthlyDetails = [];
  let cumIncome = 0, cumDeduct = 0, cumThreshold = 0, cumTaxPaid = 0;

  for (let m = 1; m <= 12; m++) {
    let grossThisMonth = monthly;
    if (mode === 'combined' && m === bm) grossThisMonth += bonus;

    cumIncome    += grossThisMonth;
    cumDeduct    += personalTotal;
    cumThreshold += CONFIG.taxThresholdMonthly;

    const taxable   = Math.max(0, cumIncome - cumDeduct - cumThreshold);
    const cumTaxDue = cumulativeTax(taxable);
    let tax = Math.max(0, round2(cumTaxDue - cumTaxPaid));
    cumTaxPaid += tax;

    // 当月累计应纳税所得额对应的边际税率档
    let marginalRate = 0;
    if (taxable > 0) {
      for (const [ub, r] of CONFIG.yearlyBrackets) {
        if (taxable <= ub) { marginalRate = r; break; }
      }
    }

    if (mode === 'separate' && m === bm && bonus > 0) {
      tax = round2(tax + bonusTaxSeparate(bonus));
      grossThisMonth += bonus;
    }

    monthlyDetails.push({
      month: m,
      gross: round2(grossThisMonth),
      tax: tax,
      net: round2(grossThisMonth - personalTotal - tax),
      rate: marginalRate,
    });
  }

  const annualTax = round2(monthlyDetails.reduce((s, x) => s + x.tax, 0));
  const separateBonusTax = (mode === 'separate' && bonus > 0) ? round2(bonusTaxSeparate(bonus)) : 0;
  const salaryTax = round2(annualTax - separateBonusTax);
  const annualNet = round2(monthlyDetails.reduce((s, x) => s + x.net, 0));

  const ann = name => {
    const i = insurance.find(x => x.name === name);
    return round2((i ? i.personalAmount : 0) * 12);
  };
  const annCompany = name => {
    const i = insurance.find(x => x.name === name);
    return round2((i ? i.companyAmount : 0) * 12);
  };

  return {
    insurance, personalTotal, companyTotal,
    socialBase, hfBase, socialIsCustom, hfIsCustom,
    _customSocialBase, _customHfBase,
    bonusMonth: bm,
    monthly: monthlyDetails,
    annualTax, salaryTax, bonusTax: separateBonusTax, annualNet,
    annualGross: round2(monthly * 12 + bonus),
    annualBonus: bonus,
    mode,
    ann: {
      pension:     ann('养老保险'),
      medical:     ann('医疗保险'),
      unemploy:    ann('失业保险'),
      injury:      ann('工伤保险'),
      maternity:   ann('生育保险'),
      housingFund:        ann('住房公积金'),
      housingFundCompany: annCompany('住房公积金'),
      housingFundTotal:   round2(ann('住房公积金') + annCompany('住房公积金')),
    }
  };
}

// ================= 渲染 =================
const fmt = x => {
  if (!isFinite(x)) return '—';
  return x.toLocaleString('zh-CN', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
};
const pct = x => {
  const v = x * 100;
  if (Math.abs(v - Math.round(v)) < 1e-9) return `${Math.round(v)}%`;
  // 保留 2 位小数，但去掉末尾多余的 0：0.50→0.5，8.50→8.5
  return `${v.toFixed(2).replace(/\.?0+$/, '')}%`;
};

function render(r) {
  document.getElementById('annualNet').textContent = fmt(r.annualNet);

  // 月度速览：不含年终奖的平均到手
  // 直接重算一次 bonus=0 的场景，结果最精确（避开两种计税方式的反推误差）
  const salaryOnly = r.annualBonus > 0
    ? calculate({
        monthly: (r.annualGross - r.annualBonus) / 12,
        bonus: 0,
        mode: r.mode,
        bonusMonth: r.bonusMonth,
        customSocialBase: r._customSocialBase,
        customHfBase: r._customHfBase,
      })
    : r;
  const avgCash = round2(salaryOnly.annualNet / 12);
  const avgReal = round2(avgCash + salaryOnly.ann.housingFundTotal / 12);
  document.getElementById('avgCash').textContent = fmt(avgCash);
  document.getElementById('avgReal').textContent = fmt(avgReal);

  // 前两排（有无年终奖都相同）
  // 实得年薪 = 年到手 + 个人公积金 + 公司公积金
  // （年到手是现金流，公积金虽然进账户但也是你的钱，所以全部加回）
  const realIncome = round2(r.annualNet + r.ann.housingFundTotal);
  const items = [
    // 第一排：总收入 → 实得 → 税 → 个人公积金
    ['税前年薪',   r.annualGross],
    ['含公积金年薪',   realIncome],
    ['年度缴税',   r.annualTax],
    ['个人公积金', r.ann.housingFund],
    // 第二排：五险一金（个人承担）
    ['养老保险',   r.ann.pension],
    ['医疗保险',   r.ann.medical],
    ['失业保险',   r.ann.unemploy],
    ['公积金合计', r.ann.housingFundTotal],
  ];

  // 第三排：年终奖相关（始终显示，即使年终奖为 0）
  {
    // 计算另一种计税方式下的年到手，用于对比
    const otherMode = r.mode === 'separate' ? 'combined' : 'separate';
    const other = calculate({
      monthly: (r.annualGross - r.annualBonus) / 12,
      bonus: r.annualBonus,
      mode: otherMode,
      bonusMonth: r.bonusMonth || 12,
      customSocialBase: r._customSocialBase,
      customHfBase: r._customHfBase,
    });
    const diff = round2(r.annualNet - other.annualNet);
    const hasBonus = r.annualBonus > 0;
    // 税前 - 含公积金年薪：正常情况下为正，表示一年"税 + 保险"的净损失
    // 低收入时可能为负（公司公积金福利 > 税+保险扣款），此时 = 净收益
    const lossAmount = round2(r.annualGross - realIncome);
    const lossLabel = lossAmount >= 0 ? '税后差额' : '公积金倒贴';
    items.push([lossLabel, Math.abs(lossAmount)]);
    items.push(['工资个税',    hasBonus ? r.salaryTax  : null]);
    items.push(['年终奖个税',  hasBonus ? r.bonusTax   : null]);
    items.push({
      compare: true,
      currentLabel: r.mode === 'separate' ? '单独计税' : '并入综合',
      diff: diff,
      otherMode: otherMode,
    });
  }
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = items.map(it => {
    // 对比格：可点击切换计税方式
    if (it && it.compare) {
      const absDiff = Math.abs(it.diff);
      let topValue;      // 上方：差值数字
      if (absDiff < 1) {
        topValue = '等同';
      } else if (it.diff > 0) {
        // 当前方式比另一种多拿 → 当前更划算
        topValue = `省 ${fmt(absDiff)}`;
      } else {
        // 另一种更划算 → 点一下切换
        topValue = `差 ${fmt(absDiff)}`;
      }
      const clickable = absDiff >= 1 && it.diff < 0;
      return `<div class="item compare ${clickable ? 'clickable' : ''}" data-other="${it.otherMode}">
        <div class="v">${topValue}</div>
        <div class="t">${it.currentLabel}</div>
      </div>`;
    }
    const [t, v] = it;
    return `<div class="item"><div class="v">${v === null ? '—' : fmt(v)}</div><div class="t">${t}</div></div>`;
  }).join('');

  // 绑定点击切换
  const clickableCompare = grid.querySelector('.item.compare.clickable');
  if (clickableCompare) {
    clickableCompare.addEventListener('click', () => {
      const next = clickableCompare.dataset.other;
      bonusMode = next;
      [...$bonusModeWrap.children].forEach(b =>
        b.classList.toggle('active', b.dataset.v === next));
      saveAndRecalc();
    });
  }

  document.getElementById('insuranceBody').innerHTML = r.insurance.map(i =>
    `<tr>
      <td>${i.name}</td>
      <td>${fmt(i.base)}</td>
      <td><span class="amt-cell"><span class="amt">${fmt(i.personalAmount)}</span><span class="pct">${pct(i.personalRate)}</span></span></td>
      <td><span class="amt-cell"><span class="amt">${fmt(i.companyAmount)}</span><span class="pct">${pct(i.companyRate)}</span></span></td>
    </tr>`
  ).join('');
  document.getElementById('personalTotal').textContent = fmt(r.personalTotal);
  document.getElementById('companyTotal').textContent  = fmt(r.companyTotal);

  // 基数说明：显示 clamp 规则，且高亮是否触达上/下限
  const gross = r.annualGross ? (r.annualGross - r.annualBonus) / 12 : 0;

  function baseHint(isCustom, customVal, autoProbe, lo, hi) {
    if (isCustom) {
      let tag = ` <span class="custom">自定义</span>`;
      if (customVal > hi) tag += ` <span class="hit">超上限，已截</span>`;
      else if (customVal < lo) tag += ` <span class="hit">低于下限，已提</span>`;
      return tag;
    }
    if (autoProbe > hi) return ` <span class="hit">已触达上限</span>`;
    if (autoProbe < lo && autoProbe > 0) return ` <span class="hit">低于下限，已按下限计</span>`;
    return ``;
  }
  const socialHit = baseHint(r.socialIsCustom, r._customSocialBase, gross,
                             CONFIG.socialBaseMin, CONFIG.socialBaseMax);
  const hfHit = baseHint(r.hfIsCustom, r._customHfBase, gross,
                         CONFIG.housingFundBaseMin, CONFIG.housingFundBaseMax);
  document.getElementById('baseNote').innerHTML =
    `<span class="bn-label">社保基数</span>
     <span class="bn-val">${fmt(r.socialBase)}${socialHit}</span>
     <span class="bn-limit">限额 ${fmt(CONFIG.socialBaseMin)} – ${fmt(CONFIG.socialBaseMax)}</span>
     <span class="bn-label">公积金基数</span>
     <span class="bn-val">${fmt(r.hfBase)}${hfHit}</span>
     <span class="bn-limit">限额 ${fmt(CONFIG.housingFundBaseMin)} – ${fmt(CONFIG.housingFundBaseMax)}</span>`;

  // 税率交替色：每跳一档切换一次，让你一眼看出"这几个月是同一档"
  let rateClass = 'rate-a';
  let lastRate = -1;
  document.getElementById('monthlyBody').innerHTML = r.monthly.map(m => {
    if (m.rate !== lastRate) {
      rateClass = rateClass === 'rate-a' ? 'rate-b' : 'rate-a';
      lastRate = m.rate;
    }
    const rate = m.rate > 0
      ? `<span class="${rateClass}">${Math.round(m.rate * 100)}%</span>`
      : `<span class="muted">—</span>`;
    return `<tr>
      <td><span class="mc-month">${m.month}月</span></td>
      <td><span class="mc-num">${fmt(m.gross)}</span></td>
      <td><span class="mc-rate">${rate}</span></td>
      <td><span class="mc-num">${fmt(m.tax)}</span></td>
      <td><span class="mc-num">${fmt(m.net)}</span></td>
    </tr>`;
  }).join('');
}

// ================= 交互 =================
const $salary = document.getElementById('salary');
const $bonus  = document.getElementById('bonus');
const $socialBase = document.getElementById('socialBase');
const $hfBase = document.getElementById('hfBase');
const $syncBase = document.getElementById('syncBase');
const $bonusMonth = document.getElementById('bonusMonth');
const $bonusModeWrap = document.getElementById('bonusMode');

// 月份下拉
for (let i = 1; i <= 12; i++) {
  const opt = document.createElement('option');
  opt.value = i; opt.textContent = `${i} 月`;
  if (i === 2) opt.selected = true;
  $bonusMonth.appendChild(opt);
}

let bonusMode = 'separate';
$bonusModeWrap.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  [...$bonusModeWrap.children].forEach(b => b.classList.toggle('active', b === btn));
  bonusMode = btn.dataset.v;
  saveAndRecalc();
});

function readInputs() {
  const s = parseFloat($salary.value) || 0;
  const b = parseFloat($bonus.value)  || 0;
  // 基数只有在 input 被标记为真实输入时才作为自定义值使用，否则视为 null（跟随月薪）
  const sbRaw = $socialBase.dataset.user === 'true' ? parseFloat($socialBase.value) : NaN;
  const hbRaw = $hfBase.dataset.user === 'true'     ? parseFloat($hfBase.value)     : NaN;
  return {
    monthly: Math.max(0, s),
    bonus:   Math.max(0, b),
    mode:    bonusMode,
    bonusMonth: parseInt($bonusMonth.value, 10),
    customSocialBase: (isFinite(sbRaw) && sbRaw > 0) ? sbRaw : null,
    customHfBase:     (isFinite(hbRaw) && hbRaw > 0) ? hbRaw : null,
  };
}

// 用影子值填充基数输入框（表示当前跟随月薪的结果）
function fillBaseShadow(r) {
  function setShadow($el, shadow) {
    if ($el.dataset.user === 'true') return; // 用户已输入，不覆盖
    $el.value = shadow > 0 ? String(shadow) : '';
    $el.classList.add('auto-value');
  }
  setShadow($socialBase, r.socialIsCustom ? 0 : r.socialBase);
  setShadow($hfBase,     r.hfIsCustom     ? 0 : r.hfBase);
}

function saveAndRecalc() {
  const input = readInputs();
  try {
    localStorage.setItem('salaryCalc', JSON.stringify({ ...input, bonusMode, bonusMultiplier }));
  } catch (e) {}
  const result = calculate(input);
  render(result);
  fillBaseShadow(result);
}

// 年终奖倍数（null 表示自由输入模式，数字表示 "= 月薪 × N"）
let bonusMultiplier = null;
const $bonusQuick = document.getElementById('bonusQuick');

function updateBonusFromMultiplier() {
  if (bonusMultiplier == null) return;
  const s = parseFloat($salary.value) || 0;
  $bonus.value = round2(s * bonusMultiplier);
}
function highlightQuickButton() {
  [...$bonusQuick.children].forEach(b => {
    const m = parseFloat(b.dataset.m);
    b.classList.toggle('active', bonusMultiplier != null && m === bonusMultiplier);
  });
}

// 恢复上次输入
try {
  const saved = JSON.parse(localStorage.getItem('salaryCalc') || 'null');
  if (saved) {
    if (typeof saved.monthly === 'number')    $salary.value = saved.monthly;
    if (typeof saved.bonus === 'number')      $bonus.value = saved.bonus;
    if (saved.bonusMonth)                     $bonusMonth.value = saved.bonusMonth;
    if (typeof saved.customSocialBase === 'number') {
      $socialBase.value = saved.customSocialBase;
      $socialBase.dataset.user = 'true';
    }
    if (typeof saved.customHfBase === 'number') {
      $hfBase.value = saved.customHfBase;
      $hfBase.dataset.user = 'true';
    }
    if (typeof saved.bonusMultiplier === 'number') {
      bonusMultiplier = saved.bonusMultiplier;
      highlightQuickButton();
    }
    if (saved.bonusMode) {
      bonusMode = saved.bonusMode;
      [...$bonusModeWrap.children].forEach(b =>
        b.classList.toggle('active', b.dataset.v === bonusMode));
    }
  }
} catch (e) {}

// 月薪变化：年终奖按倍数同步；基数字段**若为空（即跟随月薪）**也不用动（计算时自动跟随）
$salary.addEventListener('input', () => {
  updateBonusFromMultiplier();
  saveAndRecalc();
});
$bonus.addEventListener('input', () => {
  bonusMultiplier = null;
  highlightQuickButton();
  saveAndRecalc();
});
$socialBase.addEventListener('focus', () => {
  // 聚焦时：如果是"影子值"，清空让用户从头输入
  if ($socialBase.classList.contains('auto-value')) {
    $socialBase.value = '';
    $socialBase.classList.remove('auto-value');
  }
});
$socialBase.addEventListener('input', () => {
  $socialBase.dataset.user = 'true';
  $socialBase.classList.remove('auto-value');
  saveAndRecalc();
});
$socialBase.addEventListener('blur', () => {
  // 失焦时：如果用户清空了，重置为"自动跟随"状态
  if ($socialBase.value.trim() === '') {
    $socialBase.dataset.user = '';
    saveAndRecalc();
  }
});
$hfBase.addEventListener('focus', () => {
  if ($hfBase.classList.contains('auto-value')) {
    $hfBase.value = '';
    $hfBase.classList.remove('auto-value');
  }
});
$hfBase.addEventListener('input', () => {
  $hfBase.dataset.user = 'true';
  $hfBase.classList.remove('auto-value');
  saveAndRecalc();
});
$hfBase.addEventListener('blur', () => {
  if ($hfBase.value.trim() === '') {
    $hfBase.dataset.user = '';
    saveAndRecalc();
  }
});
$bonusMonth.addEventListener('change', saveAndRecalc);

// 同步按钮：把公积金基数拉成和社保一致
//  - 社保已自定义：公积金也填成同样的数（标记为用户输入）
//  - 社保是"自动跟随"：公积金也回到自动跟随状态
$syncBase.addEventListener('click', () => {
  if ($socialBase.dataset.user === 'true') {
    $hfBase.value = $socialBase.value;
    $hfBase.dataset.user = 'true';
    $hfBase.classList.remove('auto-value');
  } else {
    // 社保本身就是自动，公积金也回到自动
    $hfBase.value = '';
    $hfBase.dataset.user = '';
  }
  saveAndRecalc();
});

// 年终奖快捷按钮：月薪 × N，并记录倍数
$bonusQuick.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const mult = parseFloat(btn.dataset.m);
  bonusMultiplier = mult === 0 ? null : mult;
  updateBonusFromMultiplier();
  if (mult === 0) $bonus.value = '0';
  highlightQuickButton();
  saveAndRecalc();
});

saveAndRecalc();
</script>
</body>
</html>
